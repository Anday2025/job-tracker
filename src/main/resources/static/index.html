<!doctype html>
<html lang="no">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jobbsøker-tracker</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="container header">
    <div>
        <h1 id="t_title">Jobbsøker-tracker</h1>
        <p class="muted" id="t_subtitle">Hold oversikt over søknadene dine.</p>
    </div>

    <div class="headerRight">
        <button id="langBtn" class="pillBtn" type="button">EN</button>
        <div class="authbar">
            <span id="whoami" class="pill">Ikke innlogget</span>
            <button id="logoutBtn" class="ghost hidden" type="button">Logg ut</button>
        </div>
    </div>
</header>

<main class="container grid">
    <!-- LOGIN CARD -->
    <section class="loginWrap" id="authCard">
        <div class="loginCard">
            <h2 id="t_loginTitle">Logg inn</h2>

            <form id="authForm" class="loginForm">
                <input id="authEmail" type="email" autocomplete="email" placeholder="E-post" required />
                <input id="authPassword" type="password" autocomplete="current-password" placeholder="Passord" required />

                <button id="authSubmitBtn" class="primaryBtn" type="submit">Logg inn</button>

                <div class="loginRow">
                    <button id="toggleAuthMode" class="linkBtn" type="button">Opprett bruker</button>
                </div>

                <div id="authMsg" class="msg"></div>
            </form>
        </div>
    </section>

    <!-- APP CARD -->
    <section class="card hidden" id="appCard">
        <div class="row">
            <h2 id="t_appsTitle">Søknader</h2>
            <div class="pill" id="stats">—</div>
        </div>

        <div class="filters">
            <button class="filter active" data-filter="ALL" id="t_f_all">Alle</button>
            <button class="filter" data-filter="PLANLAGT" id="t_f_planned">Planlagt</button>
            <button class="filter" data-filter="SOKT" id="t_f_applied">Søkt</button>
            <button class="filter" data-filter="INTERVJU" id="t_f_interview">Intervju</button>
            <button class="filter" data-filter="AVSLATT" id="t_f_rejected">Avslått</button>
            <button class="filter" data-filter="TILBUD" id="t_f_offer">Tilbud</button>
        </div>

        <div class="split">
            <section class="subcard">
                <h3 id="t_newAppTitle">Ny søknad</h3>
                <form id="createForm" class="form">
                    <label>
                        <span id="t_companyLabel">Firma *</span>
                        <input name="company" required placeholder="F.eks. DNB / Telenor" id="t_companyPh" />
                    </label>

                    <label>
                        <span id="t_roleLabel">Stilling *</span>
                        <input name="role" required placeholder="F.eks. Junior utvikler" id="t_rolePh" />
                    </label>

                    <label>
                        <span id="t_linkLabel">Link</span>
                        <input name="link" placeholder="https://..." id="t_linkPh" />
                    </label>

                    <label>
                        <span id="t_deadlineLabel">Frist</span>
                        <input name="deadline" type="date" />
                    </label>

                    <button type="submit" id="t_addBtn">Legg til</button>
                    <div id="formMsg" class="msg"></div>
                </form>
            </section>

            <section class="subcard">
                <h3 id="t_listTitle">Liste</h3>
                <div id="list" class="list"></div>
            </section>
        </div>
    </section>
</main>

<footer class="container muted small" id="t_footer">
    Bygget med Java (Spring Boot) + vanilla JS + JWT.
</footer>

<script src="app.js"></script>
</body>
</html>
