<!doctype html>
<html lang="no">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jobbsøker-tracker</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="container header">
    <div class="titleRow">
        <div>
            <h1 id="t_title">Jobbsøker-tracker</h1>
            <p class="muted" id="t_subtitle">Hold oversikt over søknadene dine.</p>
        </div>

        <!-- NO/EN ved siden av tittelen -->
        <div class="langSwitch" aria-label="Language switch">
            <button id="langNoBtn" class="langBtn active" type="button">NO</button>
            <button id="langEnBtn" class="langBtn" type="button">EN</button>
        </div>
    </div>

    <!-- Logg inn / Logg ut oppe til høyre -->
    <div class="headerRight">
        <span id="whoami" class="pill hidden">—</span>

        <button id="openLoginBtn" class="pillBtn" type="button">Logg inn</button>
        <button id="logoutBtn" class="ghost hidden" type="button">Logg ut</button>
    </div>
</header>

<main class="container grid">
    <!-- APP CARD (skjult før login) -->
    <section class="card hidden" id="appCard">
        <div class="row">
            <h2 id="t_appsTitle">Søknader</h2>
            <div class="pill" id="stats">—</div>
        </div>

        <div class="filters">
            <button class="filter active" data-filter="ALL" id="t_f_all">Alle</button>
            <button class="filter" data-filter="PLANLAGT" id="t_f_planned">Planlagt</button>
            <button class="filter" data-filter="SOKT" id="t_f_applied">Søkt</button>
            <button class="filter" data-filter="INTERVJU" id="t_f_interview">Intervju</button>
            <button class="filter" data-filter="AVSLATT" id="t_f_rejected">Avslått</button>
            <button class="filter" data-filter="TILBUD" id="t_f_offer">Tilbud</button>
        </div>

        <div class="split">
            <section class="subcard">
                <h3 id="t_newAppTitle">Ny søknad</h3>

                <form id="createForm" class="form">
                    <label>
                        <span id="t_companyLabel">Firma *</span>
                        <input name="company" required placeholder="F.eks. DNB / Telenor" />
                    </label>

                    <label>
                        <span id="t_roleLabel">Stilling *</span>
                        <input name="role" required placeholder="F.eks. Junior utvikler" />
                    </label>

                    <label>
                        <span id="t_linkLabel">Link</span>
                        <input name="link" placeholder="https://..." />
                    </label>

                    <label>
                        <span id="t_deadlineLabel">Frist</span>
                        <input name="deadline" type="date" />
                    </label>

                    <button type="submit" id="t_addBtn">Legg til</button>
                    <div id="formMsg" class="msg"></div>
                </form>
            </section>

            <section class="subcard">
                <h3 id="t_listTitle">Liste</h3>
                <div id="list" class="list"></div>
            </section>
        </div>
    </section>
</main>

<footer class="container muted small" id="t_footer">
    Bygget med Java (Spring Boot) + vanilla JS + JWT.
</footer>

<!-- LOGIN MODAL (åpnes når man trykker Logg inn) -->
<div id="authModal" class="modal hidden" aria-hidden="true">
    <div class="modalBox" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <button id="closeAuthModal" class="modalClose" type="button" aria-label="Close">✕</button>

        <h2 id="authTitle">Logg inn</h2>

        <form id="authForm" class="modalForm">
            <label class="srOnly" for="authEmail">E-post</label>
            <input id="authEmail" type="email" autocomplete="email" placeholder="E-post" required />

            <label class="srOnly" for="authPassword">Passord</label>
            <input id="authPassword" type="password" autocomplete="current-password" placeholder="Passord (min 6 tegn)" required />

            <div id="authMsg" class="msg"></div>

            <div class="modalActions">
                <button id="authSubmitBtn" class="primaryBtn" type="submit">Logg inn</button>
                <button id="toggleAuthMode" class="secondaryBtn" type="button">Opprett bruker</button>
            </div>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
